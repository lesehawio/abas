<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>مصاحبه با عباس - خودشناسی و مسیر شغلی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #d9e2ec;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            direction: rtl;
            padding: 25px 15px;
        }
        .card {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #1e3c5c;
            color: white;
            padding: 28px 25px;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
        }
        .questions-area {
            padding: 30px 30px 20px;
            background: #fefcf5;
        }
        .q-item {
            background: #f0f4fa;
            margin-bottom: 30px;
            border-radius: 28px;
            padding: 18px 22px;
            border-right: 6px solid #1e3c5c;
            transition: 0.1s;
        }
        .q-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0a2b44;
            margin-bottom: 12px;
        }
        .q-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #cbdbe2;
            border-radius: 28px;
            font-family: inherit;
            background: white;
        }
        textarea.q-input {
            resize: vertical;
            min-height: 70px;
        }
        .save-hint {
            font-size: 0.7rem;
            color: #2c6e2c;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            background: #cfdec7;
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.7rem;
            display: inline-block;
        }
        .action-bar {
            background: #e6edf4;
            padding: 18px 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #cdd9ed;
        }
        button {
            background: #1e3c5c;
            border: none;
            color: white;
            padding: 9px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
        }
        button:hover {
            background: #0f2c46;
            transform: scale(0.97);
        }
        .export-btn {
            background: #2c6e3c;
        }
        .reset-btn {
            background: #a5512b;
        }
        .footer-note {
            background: #eef3fc;
            text-align: center;
            padding: 14px;
            font-size: 0.75rem;
            color: #2c4a6e;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🎤 گفتگوی واقعی با عباس</h1>
        <p>به هر سوال آروم جواب بده | بعد از پر کردن، دکمه خروجی رو بزن و فایل رو برای [اسم من] بفرست</p>
    </div>
    <div class="questions-area" id="questionsContainer"></div>
    <div class="action-bar">
        <div>
            <button id="downloadJsonBtn" class="export-btn">📥 خروجی JSON (برای من بفرست)</button>
            <button id="downloadCsvBtn">📊 خروجی CSV (Excel)</button>
        </div>
        <button id="clearAllBtn" class="reset-btn">🗑️ پاک کردن همه جواب‌ها</button>
    </div>
    <div class="footer-note">
        🔐 همه چیز فقط در مرورگر خودت ذخیره میشه. بعد از جواب دادن، روی «خروجی JSON» کلیک کن، فایل رو ذخیره کن و برام بفرست.
    </div>
</div>

<script>
    // ---------- لیست نهایی تمام سوالات (بر اساس درخواست شما) ----------
    const allQuestions = [
        "🧠 اگر پنج سال دیگه همه چیز عالی پیش رفته باشه، دوست داری زندگیت چه شکلی باشه؟",
        "🧠 دوست داری مردم تو رو به چی بشناسن؟",
        "🧠 دوست داری تو چه نقشی تو جامعه یا بین آدما دیده بشی؟",
        "🧠 موفقیت برای تو دقیقاً یعنی چی؟",
        "💼 اگر پول اصلاً مهم نبود، دوست داشتی چیکار کنی؟",
        "💼 چه کاری هست که وقتی انجامش میدی زمان یادت میره؟",
        "💼 بیشتر دوست داری: کار فنی و عملی؟ کار کامپیوتری و دیجیتال؟ کار مدیریتی؟ کار آزاد؟",
        "💼 دوست داری برای خودت کار کنی یا زیر دست کسی باشی؟",
        "💼 دوست داری یه روز صاحب چی باشی؟ (مغازه، شرکت، تیم، پروژه)",
        "⚡ چه کارهایی هست که از انجامشون حالت بد میشه؟",
        "⚡ از چه نوع زندگی‌ای بدت میاد؟",
        "⚡ بیشتر از چی فرار می‌کنی؟ (بینظمی، یکنواختی، فشار، دستور گرفتن...)",
        "⚡ چه چیزهایی بهت حس قدرت میدن؟",
        "🧩 بچگی دوست داشتی چی بشی؟",
        "🧩 اولین چیزی که فکر کردی «من توش خوبم» چی بوده؟",
        "🧩 تا حالا کی بیشتر از همه بهت حس «موفق بودن» داده؟",
        "🎯 اگر ۱۰ میلیارد پول داشتی و هیچ محدودیتی نبود، روزت چطور می‌گذشت؟",
        "🎯 صبح‌ها دوست داری کجا بیدار شی و با چه زندگی‌ای روبرو شی؟",
        "🎯 دوست داری چند نفر زیر دستت کار کنن یا تنهایی جلو بری؟",
        "🎯 زندگی آرومت رو چطور تصور می‌کنی؟",
        "❤️ برات مهم‌تره: پول، احترام، آزادی یا امنیت؟",
        "❤️ چه چیزی باعث میشه به یه آدم افتخار کنی؟",
        "❤️ توی زندگی از چی بیشتر از همه بدت میاد که اتفاق بیفته؟"
    ];

    // کلید ذخیره در localStorage
    const STORAGE_KEY = "abbas_answers_map";

    // بارگذاری جواب‌های ذخیره شده (اگر قبلاً جواب داده بود)
    function loadStoredAnswers() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                return JSON.parse(stored);
            } catch(e) { return {}; }
        }
        return {};
    }

    // ذخیره کل جواب‌ها در localStorage
    function saveAllAnswers(answersMap) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(answersMap));
    }

    // رندر کردن کل سوالات به صورت داینامیک
    function renderQuestions() {
        const container = document.getElementById("questionsContainer");
        const savedAnswers = loadStoredAnswers();
        container.innerHTML = "";

        allQuestions.forEach((q, index) => {
            const qDiv = document.createElement("div");
            qDiv.className = "q-item";
            const qId = `q_${index}`;
            const savedValue = savedAnswers[index] !== undefined ? savedAnswers[index] : "";

            // تشخیص اینکه ورودی معمولی باشه یا textarea (برای جواب‌های بلندتر)
            const isLong = q.includes("زندگی‌ات چه شکلی") || q.includes("۱۰ میلیارد") || q.includes("روزت چطور");
            const inputEl = isLong 
                ? `<textarea class="q-input" id="${qId}" rows="3" placeholder="جوابت رو بنویس...">${escapeHtml(savedValue)}</textarea>`
                : `<input type="text" class="q-input" id="${qId}" value="${escapeHtml(savedValue)}" placeholder="اینجا بنویس...">`;
            
            qDiv.innerHTML = `
                <div class="q-text">${index+1}. ${q}</div>
                ${inputEl}
                <div class="save-hint">
                    <span class="status-badge" id="status_${qId}">${savedValue ? "✓ ذخیره شده" : "❌ بدون جواب"}</span>
                    <span style="font-size:0.7rem;">✍️ به محض تایپ، جواب ذخیره میشه</span>
                </div>
            `;
            container.appendChild(qDiv);

            const inputField = document.getElementById(qId);
            // رویداد ذخیره خودکار هنگام تایپ
            inputField.addEventListener("input", (function(idx) {
                return function() {
                    const currentAnswers = loadStoredAnswers();
                    currentAnswers[idx] = inputField.value;
                    saveAllAnswers(currentAnswers);
                    // بروزرسانی وضعیت
                    const statusSpan = document.getElementById(`status_${qId}`);
                    if (statusSpan) {
                        statusSpan.innerText = inputField.value ? "✓ ذخیره شده" : "❌ بدون جواب";
                        statusSpan.style.background = inputField.value ? "#bcd9aa" : "#f0cccc";
                    }
                };
            })(index));
        });
    }

    // کمکی برای جلوگیری از XSS
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // گرفتن آبجکت پاسخ‌ها به صورت {0:"پاسخ1", 1:"پاسخ2", ...}
    function getAllAnswersObject() {
        const answers = loadStoredAnswers();
        const fullMap = {};
        for (let i = 0; i < allQuestions.length; i++) {
            fullMap[i] = answers[i] || "";
        }
        return fullMap;
    }

    // تبدیل به آرایه پاسخ + سوالات برای CSV
    function getAnswersArray() {
        const answersMap = getAllAnswersObject();
        const result = [];
        for (let i = 0; i < allQuestions.length; i++) {
            result.push({
                شماره: i+1,
                سوال: allQuestions[i],
                پاسخ: answersMap[i] || ""
            });
        }
        return result;
    }

    // دانلود JSON
    function downloadJSON() {
        const answersMap = getAllAnswersObject();
        const finalData = {
            نام_مصاحبه_شونده: "عباس",
            تاریخ: new Date().toLocaleString('fa-IR'),
            تعداد_سوالات: allQuestions.length,
            پاسخ‌ها: answersMap,
            سوالات_و_پاسخ‌ها: allQuestions.map((q, idx) => ({ سوال: q, پاسخ: answersMap[idx] || "" }))
        };
        const jsonStr = JSON.stringify(finalData, null, 2);
        const blob = new Blob([jsonStr], {type: "application/json"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `abbas_answers_${new Date().toISOString().slice(0,19)}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // دانلود CSV (برای خواندن در اکسل)
    function downloadCSV() {
        const dataRows = getAnswersArray();
        if (!dataRows.length) return;
        const headers = ["شماره", "سوال", "پاسخ"];
        const csvRows = [];
        csvRows.push(headers.join(","));
        for (const row of dataRows) {
            const escapedAnswer = `"${(row.پاسخ || "").replace(/"/g, '""')}"`;
            csvRows.push(`${row.شماره},"${row.سوال.replace(/"/g, '""')}",${escapedAnswer}`);
        }
        const blob = new Blob(["\uFEFF" + csvRows.join("\n")], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `abbas_answers.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // ریست کامل
    function resetAllAnswers() {
        if (confirm("⚠️ همه جواب‌های عباس پاک میشه! مطمئنی؟ (قابل برگشت نیست)")) {
            localStorage.removeItem(STORAGE_KEY);
            renderQuestions(); // دوباره رندر با جواب خالی
        }
    }

    // مقداردهی اولیه و اتصال دکمه‌ها
    document.addEventListener("DOMContentLoaded", () => {
        renderQuestions();
        const downloadJsonBtn = document.getElementById("downloadJsonBtn");
        const downloadCsvBtn = document.getElementById("downloadCsvBtn");
        const clearBtn = document.getElementById("clearAllBtn");
        if (downloadJsonBtn) downloadJsonBtn.addEventListener("click", downloadJSON);
        if (downloadCsvBtn) downloadCsvBtn.addEventListener("click", downloadCSV);
        if (clearBtn) clearBtn.addEventListener("click", resetAllAnswers);
    });
</script>
</body>
</html>
